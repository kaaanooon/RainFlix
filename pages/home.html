<section
  id="catalogPage"
  class="mx-auto w-full max-w-[1440px] px-6 py-8 md:px-10 lg:px-12"
  aria-label="RainFlix home"
>
  <section
    id="trendingCarousel"
    class="h-[24rem] touch-pan-y select-none overflow-hidden rounded-xl border border-blue-900/70 bg-blue-950/20 shadow-2xl shadow-black/40 md:h-[28rem]"
    aria-label="Featured titles"
  ></section>

  <section id="trendingSection" class="mt-10" aria-labelledby="trendingTitle">
    <div class="mb-5 flex items-end justify-between gap-6">
      <div>
        <h1 id="trendingTitle" class="text-3xl font-black text-slate-50">
          Trending this week
        </h1>
      </div>
    </div>
    <div
      id="trendingGrid"
      class="grid auto-cols-[9.5rem] grid-flow-col gap-3 overflow-x-auto pb-2 md:grid-flow-row md:grid-cols-5 md:gap-4 md:overflow-visible md:pb-0"
      aria-live="polite"
    ></div>
  </section>

  <section id="newestMoviesSection" class="mt-12" aria-labelledby="newestMoviesTitle">
    <div class="mb-5">
      <h2 id="newestMoviesTitle" class="text-3xl font-black text-slate-50">
        Newest movies
      </h2>
    </div>
    <div
      id="newestMoviesGrid"
      class="grid auto-cols-[9.5rem] grid-flow-col gap-3 overflow-x-auto pb-2 md:grid-flow-row md:grid-cols-5 md:gap-4 md:overflow-visible md:pb-0"
      aria-live="polite"
    ></div>
  </section>

  <section id="newestSeriesSection" class="mt-12" aria-labelledby="newestSeriesTitle">
    <div class="mb-5">
      <h2 id="newestSeriesTitle" class="text-3xl font-black text-slate-50">
        Newest series
      </h2>
    </div>
    <div
      id="newestSeriesGrid"
      class="grid auto-cols-[9.5rem] grid-flow-col gap-3 overflow-x-auto pb-2 md:grid-flow-row md:grid-cols-5 md:gap-4 md:overflow-visible md:pb-0"
      aria-live="polite"
    ></div>
  </section>

  <section id="browseSection" class="mt-12" aria-labelledby="browseTitle">
    <div class="mb-5">
      <h2 id="browseTitle" class="text-3xl font-black text-slate-50">
        Browse
      </h2>
    </div>
    <div
      id="browseGrid"
      class="grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-5 md:gap-4"
      aria-live="polite"
    ></div>
    <div id="browseSentinel" class="h-12" aria-hidden="true"></div>
  </section>
</section>
